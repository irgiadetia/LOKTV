name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good openjdk-17-jdk-headless
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer pyTelegramBotAPI

      - name: Build APK
        run: |
          # Perintah ini untuk membersihkan sisa error sebelumnya
          buildozer android clean
          # Rakit ulang dengan menyetujui lisensi secara otomatis
          printf "y\ny\ny\ny\ny\ny\n" | buildozer android debug
