name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt update
          # Kita hanya instal yang benar-benar wajib saja
          sudo apt install -y build-essential git python3-dev openjdk-17-jdk-headless zip unzip
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer pyTelegramBotAPI

      - name: Build APK
        run: |
          # Jawab 'y' otomatis untuk semua pertanyaan
          yes | buildozer -v android debug
