name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev zip unzip libncurses5
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer pyTelegramBotAPI

      - name: Build APK
        run: |
          # Bersihkan sisa gagal tadi
          rm -rf .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists
          # Rakit ulang
          buildozer -v android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
